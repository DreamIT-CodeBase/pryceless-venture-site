name: Build and deploy Node.js app to Azure Web App - pryceless-venture-site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install

      - name: Prisma Generate
        run: npx prisma generate

      - name: Migration mode
        run: |
          if [ "${{ vars.ENABLE_PRODUCTION_DB_DEPLOY }}" = "true" ]; then
            echo "Prisma migration deploy is enabled."
          else
            echo "Skipping Prisma migration deploy."
          fi

      - name: Deploy Prisma migrations
        if: ${{ vars.ENABLE_PRODUCTION_DB_DEPLOY == 'true' }}
        run: npm run db:deploy

      - name: Build application
        run: npm run build --if-present

      - name: Run tests
        run: npm run test --if-present

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pryceless-venture-ckdnbad2g9hqbad6'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DBE70EA7117D40DE8FFA55F9859194DB }}