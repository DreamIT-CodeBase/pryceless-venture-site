# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - pryceless-venture-site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: npm install

      - name: Migration mode
        run: |
          if [ "${{ vars.ENABLE_PRODUCTION_DB_DEPLOY }}" = "true" ]; then
            echo "Prisma migration deploy is enabled for this workflow run."
          else
            echo "Prisma migration deploy is skipped. Set repository variable ENABLE_PRODUCTION_DB_DEPLOY=true after production database alignment is complete."
          fi

      - name: Deploy Prisma migrations
        if: ${{ vars.ENABLE_PRODUCTION_DB_DEPLOY == 'true' }}
        run: npm run db:deploy

      - name: Build application
        run: npm run build --if-present

      - name: Run tests
        run: npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          include-hidden-files: true
          path: |
            .
            !.env
            !.env.*
            !.git/**

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pryceless-venture-site'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DBE70EA7117D40DE8FFA55F9859194DB }}
